<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Play Store">
    
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/d/d0/Google_Play_Arrow_logo.svg">

    <title>Google Play</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background: #ffffff; 
        }
        /* убираем всё лишнее, оставляем только контент */
        iframe { 
            border: none; 
            width: 100%; 
            height: 100%; 
            padding-top: env(safe-area-inset-top); /* учет челки айфона */
        }
    </style>
</head>
<body>
    <iframe src="https://play.google.com/store/apps"></iframe>
</body>
</html>
